<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新宿区生態系観測シミュレーション</title>
  <style>
    :root {
      --bg: #11161b;
      --panel: #1b232c;
      --panel2: #222d38;
      --text: #e7eef5;
      --muted: #aab6c3;
      --accent: #6fc3ff;
      --danger: #ff7878;
      --good: #8be28b;
      --grid: #2b3641;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) 360px;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #2b3641;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.22);
    }
    .panel h3 {
      margin: 0;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--panel2);
      border-bottom: 1px solid #31404f;
      letter-spacing: 0.02em;
    }
    .map-panel { grid-column: 1; grid-row: 1 / span 2; display: flex; flex-direction: column; }
    .graph-panel { grid-column: 2; grid-row: 1; }
    .log-panel { grid-column: 2; grid-row: 2; }
    .controls-panel { grid-column: 1 / span 2; grid-row: 3; }
    .canvas-wrap {
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f1419;
    }
    canvas {
      display: block;
      max-width: 100%;
      image-rendering: pixelated;
      border-radius: 8px;
      background: #0d1318;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #2b3641;
      background: #131a21;
    }
    .stat {
      background: #202b35;
      border: 1px solid #31404f;
      border-radius: 10px;
      padding: 8px;
    }
    .stat .label { color: var(--muted); font-size: 11px; }
    .stat .value { font-size: 18px; font-weight: 700; margin-top: 3px; }
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px;
      flex-wrap: wrap;
    }
    button, select, input[type="checkbox"] {
      accent-color: var(--accent);
    }
    button {
      background: #263340;
      color: var(--text);
      border: 1px solid #3a4a5b;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #304152; }
    label.toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #202b35;
      border: 1px solid #31404f;
      border-radius: 999px;
      color: var(--text);
      font-size: 13px;
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 10px 10px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: -1px;
      background: currentColor;
    }
    .log {
      padding: 10px;
      height: 100%;
      overflow: auto;
      font-size: 13px;
      line-height: 1.5;
      color: #dde7ef;
      background: #12181f;
    }
    .log-entry {
      padding: 6px 8px;
      border-bottom: 1px solid #23303d;
    }
    .subtle { color: var(--muted); font-size: 12px; }
    .topinfo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #151d24;
      border-bottom: 1px solid #2b3641;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel map-panel">
      <div class="topinfo">
        <div>
          <strong>新宿区生態系観測シミュレーション</strong>
          <div class="subtle">24×24圧縮マップ / 横型UI / 地名付き</div>
        </div>
        <div id="yearLabel">Year 0</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="mapCanvas" width="840" height="840"></canvas>
      </div>
      <div class="legend">
        <span style="color:#6d7378">都市</span>
        <span style="color:#7ab55c">草地</span>
        <span style="color:#4b8c4a">低木</span>
        <span style="color:#1f5f32">森林</span>
        <span style="color:#2f76b8">水域</span>
        <span style="color:#6f5a3f">山地</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">ネズミ</div><div class="value" id="stat-rat">0</div></div>
        <div class="stat"><div class="label">シカ</div><div class="value" id="stat-deer">0</div></div>
        <div class="stat"><div class="label">捕食者</div><div class="value" id="stat-pred">0</div></div>
        <div class="stat"><div class="label">森林率</div><div class="value" id="stat-forest">0%</div></div>
        <div class="stat"><div class="label">人間</div><div class="value" id="stat-human">0</div></div>
      </div>
    </section>

    <section class="panel graph-panel">
      <h3>推移グラフ</h3>
      <div class="canvas-wrap" style="padding:8px;"><canvas id="graphCanvas" width="340" height="250"></canvas></div>
    </section>

    <section class="panel log-panel">
      <h3>イベントログ</h3>
      <div class="log" id="log"></div>
    </section>

    <section class="panel controls-panel">
      <h3>操作</h3>
      <div class="controls">
        <button id="playBtn">再生</button>
        <button id="stepBtn">1年進める</button>
        <button id="resetBtn">リセット</button>
        <label class="toggle"><input type="checkbox" id="toggleHuman" checked> 人間 ON</label>
        <label class="toggle"><input type="checkbox" id="toggleWolf"> オオカミ ON</label>
        <label class="toggle"><input type="checkbox" id="toggleMammoth"> マンモス ON</label>
        <label class="toggle">速度
          <select id="speedSelect">
            <option value="1000">1x</option>
            <option value="500">2x</option>
            <option value="220">5x</option>
            <option value="120">10x</option>
          </select>
        </label>
        <span class="subtle">人間は都庁・Lv1スタート。シカは10年後、クマは20年後に西から流入開始。</span>
      </div>
    </section>
  </div>

  <script>
    const W = 24, H = 24;
    const CELL = 35;
    const mapCanvas = document.getElementById('mapCanvas');
    const mapCtx = mapCanvas.getContext('2d');
    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');
    const logEl = document.getElementById('log');

    const TILE = {
      CITY: 'city',
      WATER: 'water',
      MOUNTAIN: 'mountain'
    };
    const tileBaseColor = {
      city: '#6d7378',
      water: '#2f76b8',
      mountain: '#6f5a3f'
    };

    const placeLabels = [
      { name: '富士山麓', x: 1, y: 12 },
      { name: '多摩川', x: 4, y: 12 },
      { name: '明治神宮', x: 7, y: 11 },
      { name: '歌舞伎町', x: 12, y: 10 },
      { name: '高田馬場', x: 10, y: 6 },
      { name: '早稲田', x: 12, y: 7 },
      { name: '都庁', x: 10, y: 11 },
      { name: '新宿御苑', x: 12, y: 19 },
      { name: '神田川', x: 11, y: 2 },
      { name: '東京タワー', x: 18, y: 10 },
      { name: 'レインボーブリッジ', x: 20, y: 11 },
      { name: 'お台場', x: 22, y: 12 },
      { name: '富士山', x: 0, y: 3 },
    ];

    let state;
    let timer = null;

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function rint(min, max) { return Math.floor(rand(min, max + 1)); }
    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

    function addLog(text) {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.textContent = `Year ${state.year}: ${text}`;
      logEl.prepend(div);
      while (logEl.children.length > 60) logEl.removeChild(logEl.lastChild);
    }

    function makeCell(x, y) {
      return {
        x, y,
        tile: TILE.CITY,
        urbanDecay: 0.25,
        grass: 0.35,
        shrub: 0.25,
        tree: 0.10,
        plantStage: 2,
        waterPlants: 0,
        counts: {
          sparrow: 0, crow: 0, bat: 0, rat: 0,
          cat: 0, dog: 0, tanuki: 0, boar: 0,
          deer: 0, bear: 0, fish: 0, porpoise: 0,
          wolf: 0, mammoth: 0
        },
        humanBase: null
      };
    }

    function buildMap() {
      const grid = [];
      for (let y = 0; y < H; y++) {
        const row = [];
        for (let x = 0; x < W; x++) row.push(makeCell(x, y));
        grid.push(row);
      }

      // west mountain zone x=0-3
      for (let y = 0; y < H; y++) {
        for (let x = 0; x <= 3; x++) {
          const c = grid[y][x];
          c.tile = TILE.MOUNTAIN;
          c.tree = 0.75; c.shrub = 0.15; c.grass = 0.10; c.urbanDecay = 0;
        }
      }

      // Tama river x=3-5, y=10-14
      for (let y = 10; y <= 14; y++) {
        for (let x = 3; x <= 5; x++) {
          const c = grid[y][x];
          c.tile = TILE.WATER;
          c.grass = 0.20; c.shrub = 0.10; c.tree = 0.0; c.waterPlants = 0.6;
        }
      }

      // Kanda river y=2-3 x=5-18
      for (let y = 2; y <= 3; y++) {
        for (let x = 5; x <= 18; x++) {
          const c = grid[y][x];
          c.tile = TILE.WATER;
          c.grass = 0.20; c.shrub = 0.10; c.tree = 0; c.waterPlants = 0.55;
        }
      }

      // Meiji shrine 4x4 x=6-9 y=10-13
      for (let y = 10; y <= 13; y++) {
        for (let x = 6; x <= 9; x++) {
          const c = grid[y][x];
          c.tile = TILE.CITY;
          c.tree = 0.85; c.shrub = 0.10; c.grass = 0.05; c.urbanDecay = 0.05;
        }
      }

      // Waseda/Takadanobaba residential x=8-13 y=5-9
      for (let y = 5; y <= 9; y++) {
        for (let x = 8; x <= 13; x++) {
          const c = grid[y][x];
          c.tile = TILE.CITY;
          c.grass = 0.40; c.shrub = 0.25; c.tree = 0.10; c.urbanDecay = 0.25;
        }
      }

      // Shinjuku Gyoen 5x5 x=10-14 y=17-21
      for (let y = 17; y <= 21; y++) {
        for (let x = 10; x <= 14; x++) {
          const c = grid[y][x];
          c.tile = TILE.CITY;
          c.grass = 0.55; c.shrub = 0.10; c.tree = 0.35; c.urbanDecay = 0.10;
        }
      }

      // Odaiba x=21-23 y=9-14
      for (let y = 9; y <= 14; y++) {
        for (let x = 21; x <= 23; x++) {
          const c = grid[y][x];
          c.tile = TILE.WATER;
          c.grass = 0.10; c.shrub = 0.05; c.tree = 0.0; c.waterPlants = 0.7;
          c.counts.fish = rint(8, 14);
        }
      }

      // Rainbow bridge x=19-21 y=11-12 (bridge over water/city mix)
      for (let y = 11; y <= 12; y++) {
        for (let x = 19; x <= 21; x++) {
          const c = grid[y][x];
          if (x < 21) {
            c.tile = TILE.CITY;
            c.grass = 0.15; c.shrub = 0.05; c.tree = 0.0; c.urbanDecay = 0.10;
          }
        }
      }

      // Tokyo Tower display area x=18 y=10 remains city core

      // Kabukicho core around x=12-14 y=9-11
      for (let y = 9; y <= 11; y++) {
        for (let x = 12; x <= 14; x++) {
          const c = grid[y][x];
          c.grass = 0.22; c.shrub = 0.16; c.tree = 0.03; c.urbanDecay = 0.35;
        }
      }

      // default urban smoothing
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const c = grid[y][x];
          if (c.tile === TILE.CITY && c.tree === 0.10 && c.grass === 0.35 && c.shrub === 0.25) {
            c.grass += rand(-0.05, 0.05);
            c.shrub += rand(-0.05, 0.05);
            c.tree += rand(-0.03, 0.03);
            normalizePlants(c);
          }
        }
      }

      return grid;
    }

    function normalizePlants(cell) {
      if (cell.tile === TILE.WATER) return;
      cell.grass = clamp(cell.grass, 0, 1);
      cell.shrub = clamp(cell.shrub, 0, 1);
      cell.tree = clamp(cell.tree, 0, 1);
      const total = cell.grass + cell.shrub + cell.tree;
      if (total <= 0) {
        cell.grass = 1; cell.shrub = 0; cell.tree = 0;
        return;
      }
      cell.grass /= total;
      cell.shrub /= total;
      cell.tree /= total;
    }

    function emptyAnimalCounts() {
      return {
        sparrow: 0, crow: 0, bat: 0, rat: 0,
        cat: 0, dog: 0, tanuki: 0, boar: 0,
        deer: 0, bear: 0, fish: 0, porpoise: 0,
        wolf: 0, mammoth: 0
      };
    }

    function resetState() {
      state = {
        year: 0,
        running: false,
        grid: buildMap(),
        history: [],
        human: {
          enabled: document.getElementById('toggleHuman').checked,
          level: 1,
          population: 20,
          baseX: 10,
          baseY: 11,
          foodBuffer: 5,
          alive: true
        },
        toggles: {
          wolf: document.getElementById('toggleWolf').checked,
          mammoth: document.getElementById('toggleMammoth').checked
        }
      };

      // place human base 2x2 around Tochō
      if (state.human.enabled) {
        for (let y = 11; y <= 12; y++) {
          for (let x = 10; x <= 11; x++) {
            state.grid[y][x].humanBase = true;
          }
        }
      }

      seedAnimals();
      pushHistory();
      renderAll();
      addLog('シミュレーションを初期化。都庁拠点から観測開始。');
    }

    function distribute(species, cells, total) {
      let remaining = total;
      while (remaining > 0) {
        const cell = cells[rint(0, cells.length - 1)];
        cell.counts[species] += 1;
        remaining--;
      }
    }

    function cellsInRect(x1, y1, x2, y2) {
      const arr = [];
      for (let y = y1; y <= y2; y++) {
        for (let x = x1; x <= x2; x++) arr.push(state.grid[y][x]);
      }
      return arr;
    }

    function cellsBy(fn) {
      const arr = [];
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) if (fn(state.grid[y][x])) arr.push(state.grid[y][x]);
      return arr;
    }

    function seedAnimals() {
      // default small animals
      distribute('rat', cellsInRect(12, 9, 14, 11), 40);      // Kabukicho
      distribute('rat', cellsInRect(8, 5, 13, 9), 25);        // Waseda/Takadanobaba
      distribute('rat', cellsBy(c => c.tile === TILE.CITY && !c.humanBase), 35);

      distribute('sparrow', cellsBy(c => c.grass > 0.30 && c.tile !== TILE.WATER), 80);
      distribute('crow', cellsBy(c => c.tile === TILE.CITY || c.tile === TILE.WATER), 50);
      distribute('bat', cellsBy(c => c.tree > 0.30 || c.tile === TILE.WATER), 60);

      // cats follow rats and sparrows
      distribute('cat', cellsInRect(11, 8, 14, 11), 10);
      distribute('cat', cellsInRect(8, 5, 12, 8), 8);
      distribute('cat', cellsBy(c => c.tile === TILE.CITY), 2);

      // dogs wider territories
      distribute('dog', cellsInRect(8, 5, 13, 9), 8);
      distribute('dog', cellsInRect(5, 2, 10, 4), 4); // near Kanda river
      distribute('dog', cellsInRect(10, 16, 14, 20), 4); // near Gyoen
      distribute('dog', cellsInRect(6, 9, 9, 13), 4); // around shrine boundary

      // tanuki sparse belts
      distribute('tanuki', cellsInRect(6, 10, 9, 13), 5); // Meiji Shrine
      distribute('tanuki', cellsInRect(5, 2, 18, 3), 5); // Kanda River
      distribute('tanuki', cellsInRect(10, 17, 14, 21), 3); // Gyoen
      distribute('tanuki', cellsInRect(8, 5, 13, 9), 3); // edges of residential

      // boar sparse
      distribute('boar', cellsInRect(1, 9, 5, 14), 8);
      distribute('boar', cellsInRect(6, 15, 10, 20), 6);
      distribute('boar', cellsInRect(6, 10, 9, 13), 4);

      // fish / porpoise
      for (const c of cellsBy(c => c.tile === TILE.WATER)) {
        c.counts.fish += rint(4, 10);
      }
      distribute('porpoise', cellsInRect(21, 9, 23, 14), 4);

      // toggles
      if (state.toggles.wolf) {
        distribute('wolf', cellsInRect(1, 7, 3, 16), 10);
      }
      if (state.toggles.mammoth) {
        distribute('mammoth', cellsBy(c => c.tile !== TILE.WATER && c.x >= 3 && c.x <= 18), 6);
      }
    }

    function totalSpecies(name) {
      let sum = 0;
      for (const row of state.grid) for (const c of row) sum += c.counts[name] || 0;
      return sum;
    }

    function totalPredators() {
      return totalSpecies('cat') + totalSpecies('dog') + totalSpecies('tanuki') + totalSpecies('bear') + totalSpecies('wolf');
    }

    function forestRate() {
      let treeSum = 0, count = 0;
      for (const row of state.grid) {
        for (const c of row) {
          if (c.tile !== TILE.WATER) { treeSum += c.tree; count++; }
        }
      }
      return count ? Math.round((treeSum / count) * 100) : 0;
    }

    function pushHistory() {
      state.history.push({
        year: state.year,
        rat: totalSpecies('rat'),
        deer: totalSpecies('deer'),
        pred: totalPredators(),
        forest: forestRate(),
        human: state.human.alive ? state.human.population : 0
      });
      if (state.history.length > 80) state.history.shift();
    }

    function nearestNeighbors(x, y, dist) {
      const arr = [];
      for (let dy = -dist; dy <= dist; dy++) {
        for (let dx = -dist; dx <= dist; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || ny < 0 || nx >= W || ny >= H || (dx === 0 && dy === 0)) continue;
          arr.push(state.grid[ny][nx]);
        }
      }
      return arr;
    }

    function bestNeighborFor(cell, species) {
      const neighbors = nearestNeighbors(cell.x, cell.y, speciesMoveRange(species));
      let best = cell;
      let bestScore = -Infinity;
      for (const n of neighbors) {
        if ((species === 'fish' || species === 'porpoise') && n.tile !== TILE.WATER) continue;
        if (species !== 'fish' && species !== 'porpoise' && n.tile === TILE.WATER) continue;
        let score = 0;
        switch (species) {
          case 'rat':
            score = n.tile === TILE.CITY ? 4 : 0;
            score += n.grass * 2 + n.urbanDecay * 2;
            break;
          case 'sparrow':
            score = n.grass * 3 + n.shrub * 2 + (n.tile === TILE.CITY ? 1 : 0);
            break;
          case 'crow':
            score = (n.tile === TILE.CITY ? 2 : 0) + (n.tile === TILE.WATER ? 1 : 0) + totalCounts(n) * 0.03;
            break;
          case 'bat':
            score = n.tree * 3 + (n.tile === TILE.WATER ? 1.5 : 0);
            break;
          case 'cat':
            score = n.counts.rat * 1.2 + n.counts.sparrow * 0.8 + (n.tile === TILE.CITY ? 1.5 : 0);
            break;
          case 'dog':
            score = n.counts.rat * 1.0 + n.counts.sparrow * 0.4 + (n.tile === TILE.CITY ? 1.2 : 0) + (n.tree > 0.2 ? 0.5 : 0);
            break;
          case 'tanuki':
            score = n.counts.rat * 0.4 + n.tree * 1.0 + n.shrub * 1.0 + (n.tile === TILE.CITY ? 0.5 : 0);
            break;
          case 'boar':
            score = n.grass * 2 + n.shrub * 2 + (n.tile === TILE.CITY ? 0.5 : 0);
            break;
          case 'deer':
            score = n.grass * 3 + n.shrub * 1.5 - n.tree * 0.5;
            break;
          case 'bear':
            score = n.counts.deer * 1.1 + n.counts.tanuki * 0.6 + n.counts.rat * 0.2 + n.tree * 0.8 + n.shrub * 0.6;
            break;
          case 'wolf':
            score = n.counts.deer * 1.4 + (n.humanBase ? (state.human.level <= 2 ? 1.8 : 0.8) : 0) + n.grass;
            break;
          case 'mammoth':
            score = n.grass * 4 - (n.tile === TILE.CITY ? 0.4 : 0);
            break;
          case 'fish':
            score = n.tile === TILE.WATER ? (1 + n.waterPlants * 2) : -999;
            break;
          case 'porpoise':
            score = n.tile === TILE.WATER ? (n.counts.fish * 1.2 + n.waterPlants) : -999;
            break;
        }
        score += rand(-0.5, 0.5);
        if (score > bestScore) { bestScore = score; best = n; }
      }
      return best;
    }

    function speciesMoveRange(species) {
      return {
        rat: 1, sparrow: 2, crow: 2, bat: 3,
        cat: 2, dog: 2, tanuki: 2, boar: 2,
        deer: 3, bear: 3, wolf: 3, mammoth: 2,
        fish: 1, porpoise: 3
      }[species] || 1;
    }

    function speciesStay(species) {
      return {
        rat: 0.8, sparrow: 0.6, crow: 0.5, bat: 0.5,
        cat: 0.7, dog: 0.5, tanuki: 0.7, boar: 0.6,
        deer: 0.5, bear: 0.4, wolf: 0.45, mammoth: 0.5,
        fish: 0.7, porpoise: 0.4
      }[species] || 0.6;
    }

    function moveSpecies(species) {
      const next = Array.from({ length: H }, () => Array.from({ length: W }, () => 0));
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const cell = state.grid[y][x];
          let n = cell.counts[species] || 0;
          while (n-- > 0) {
            const stay = Math.random() < speciesStay(species);
            const target = stay ? cell : bestNeighborFor(cell, species);
            next[target.y][target.x] += 1;
          }
        }
      }
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) state.grid[y][x].counts[species] = next[y][x];
    }

    function totalCounts(cell) {
      let sum = 0;
      for (const v of Object.values(cell.counts)) sum += v;
      return sum;
    }

    function humanTurn() {
      if (!state.human.enabled || !state.human.alive) return;
      let food = 0;
      const rangeCells = [];
      for (let y = Math.max(0, state.human.baseY - 2); y <= Math.min(H - 1, state.human.baseY + 2); y++) {
        for (let x = Math.max(0, state.human.baseX - 2); x <= Math.min(W - 1, state.human.baseX + 2); x++) rangeCells.push(state.grid[y][x]);
      }
      for (const c of rangeCells) {
        food += c.counts.rat * 0.06;
        food += c.counts.fish * 0.04;
        food += c.grass * 0.25;
        // humans keep land open
        c.shrub = Math.max(0, c.shrub - 0.02);
        c.grass = Math.min(1, c.grass + 0.02);
        normalizePlants(c);
      }
      if (state.human.foodBuffer > 0) {
        food += 2.5;
        state.human.foodBuffer--;
      }
      if (food >= 3.2) {
        if (state.human.population >= 15 && state.human.yearStable == null) state.human.yearStable = state.year;
      } else {
        state.human.population -= rint(0, 1);
      }
      if (food >= 3.8 && state.human.population >= 15 && state.year >= 12 && state.human.level < 3) {
        if (Math.random() < 0.08) {
          state.human.level++;
          addLog(`都庁拠点の文明レベルが Lv${state.human.level} に上昇。`);
        }
      }
      if (food < 2.0 && state.human.level > 1 && Math.random() < 0.10) {
        state.human.level--;
        addLog(`食料不足で都庁拠点の文明レベルが Lv${state.human.level} に低下。`);
      }
      // reproduction
      if (state.year > 0 && state.year % 10 === 0 && food >= 3.5 && state.human.population >= 10 && Math.random() < 0.5) {
        const gain = rint(1, 2);
        state.human.population += gain;
        addLog(`人間拠点で ${gain} 人増加。`);
      }
      if (state.human.population <= 0) {
        state.human.population = 0;
        state.human.alive = false;
        addLog('都庁拠点の人間が消滅。');
      }
    }

    function migrationTurn() {
      // deer begins after 10 years
      if (state.year >= 10 && Math.random() < 0.25) {
        const y = rint(5, 18);
        const group = rint(1, 3);
        state.grid[y][0].counts.deer += group;
        if (Math.random() < 0.35) addLog(`西からシカ ${group} 頭が流入。`);
      }
      // bear after 20 years
      if (state.year >= 20 && Math.random() < 0.05) {
        const y = rint(7, 16);
        state.grid[y][0].counts.bear += 1;
        addLog('西からクマが流入。');
      }
      if (state.year >= 14 && Math.random() < 0.07) {
        const y = rint(8, 18);
        state.grid[y][1].counts.boar += rint(1, 2);
      }
    }

    function plantSuccession() {
      for (const row of state.grid) {
        for (const c of row) {
          if (c.tile === TILE.WATER) {
            c.waterPlants = clamp(c.waterPlants + rand(-0.03, 0.05), 0.25, 0.95);
            continue;
          }
          // natural succession
          let growth = 0.02;
          if (c.tile === TILE.MOUNTAIN) growth += 0.01;
          if (c.urbanDecay < 0.40) growth += 0.01;

          // herbivore impacts
          const impact = c.counts.deer * 0.05 + c.counts.boar * 0.06 + c.counts.bear * 0.03 + c.counts.mammoth * 0.14;
          c.grass = clamp(c.grass + 0.03 - c.counts.deer * 0.02 - c.counts.boar * 0.015, 0, 1);
          c.shrub = clamp(c.shrub + growth - c.counts.boar * 0.02 - c.counts.deer * 0.01, 0, 1);
          c.tree = clamp(c.tree + growth * 0.6 - impact * 0.2, 0, 1);

          if (c.counts.mammoth > 0 && Math.random() < 0.35) {
            c.tree = Math.max(0, c.tree - 0.18);
            c.shrub = Math.max(0, c.shrub - 0.08);
            c.grass = Math.min(1, c.grass + 0.20);
          }
          if (!c.humanBase) c.urbanDecay = clamp(c.urbanDecay + 0.01, 0, 0.85);
          normalizePlants(c);
        }
      }
    }

    function predationTurn() {
      for (const row of state.grid) {
        for (const c of row) {
          // cats eat rats/sparrows
          let catKills = Math.min(c.counts.cat, c.counts.rat, rint(0, c.counts.cat));
          c.counts.rat = Math.max(0, c.counts.rat - Math.floor(catKills * 0.7));
          c.counts.sparrow = Math.max(0, c.counts.sparrow - Math.floor(c.counts.cat * 0.15 * Math.random()));

          // dogs broader predation
          c.counts.rat = Math.max(0, c.counts.rat - Math.floor(c.counts.dog * 0.4 * Math.random()));
          c.counts.sparrow = Math.max(0, c.counts.sparrow - Math.floor(c.counts.dog * 0.15 * Math.random()));

          // tanuki
          c.counts.rat = Math.max(0, c.counts.rat - Math.floor(c.counts.tanuki * 0.2 * Math.random()));

          // wolves
          if (c.counts.wolf > 0) {
            const deerLoss = Math.min(c.counts.deer, Math.floor(c.counts.wolf * (0.5 + Math.random() * 0.6)));
            c.counts.deer = Math.max(0, c.counts.deer - deerLoss);
            if (c.humanBase && state.human.alive) {
              let success = state.human.level === 1 ? 0.80 : state.human.level === 2 ? 0.60 : 0.30;
              success += Math.min(0.30, Math.max(0, c.counts.wolf - 1) * 0.10);
              success -= state.human.level === 3 ? 0.20 : state.human.level === 2 ? 0.10 : 0.00;
              if (Math.random() < success * 0.35) {
                const loss = rint(1, Math.min(3, state.human.population));
                state.human.population -= loss;
                addLog(`オオカミ群が都庁拠点を襲撃。人間 ${loss} 人減少。`);
                if (state.human.population <= 0) {
                  state.human.population = 0; state.human.alive = false;
                  addLog('都庁拠点がオオカミに制圧された。');
                }
              }
            }
          }

          // bears
          if (c.counts.bear > 0) {
            c.counts.deer = Math.max(0, c.counts.deer - Math.floor(c.counts.bear * 0.6 * Math.random()));
            if (c.humanBase && state.human.alive && Math.random() < (state.human.level === 3 ? 0.15 : 0.40)) {
              const loss = rint(1, Math.min(2, state.human.population));
              state.human.population -= loss;
              addLog(`クマが都庁拠点を襲撃。人間 ${loss} 人減少。`);
            }
          }

          // porpoise eats fish
          c.counts.fish = Math.max(0, c.counts.fish - Math.floor(c.counts.porpoise * (0.8 + Math.random())));
        }
      }
      if (state.human.population < 0) state.human.population = 0;
    }

    function reproduceTurn() {
      for (const row of state.grid) {
        for (const c of row) {
          if (c.tile === TILE.WATER) {
            c.counts.fish = clamp(c.counts.fish + rint(0, 2), 4, 18);
            if (c.counts.porpoise >= 2 && c.counts.fish >= 8 && state.year % 12 === 0 && Math.random() < 0.6) c.counts.porpoise += 1;
            continue;
          }
          if (state.year % 3 === 0 && c.counts.rat >= 2 && totalCounts(c) < 18) c.counts.rat += rint(0, 2);
          if (state.year % 4 === 0 && c.grass > 0.25 && c.counts.sparrow >= 2) c.counts.sparrow += rint(0, 2);
          if (state.year % 5 === 0 && (c.tree > 0.3 || nearbyWater(c)) && c.counts.bat >= 2) c.counts.bat += rint(0, 1);
          if (state.year % 6 === 0 && c.counts.tanuki >= 2 && totalCounts(c) < 12) c.counts.tanuki += rint(0, 1);
          if (state.year % 6 === 0 && c.grass > 0.35 && c.counts.boar >= 2 && totalCounts(c) < 10) c.counts.boar += rint(0, 2);
          if (state.year % 7 === 0 && c.grass > 0.4 && c.counts.deer >= 2 && totalCounts(c) < 10) c.counts.deer += rint(0, 1);
          if (state.year % 7 === 0 && c.counts.rat >= 2 && c.counts.cat >= 1 && totalCounts(c) < 15) c.counts.cat += rint(0, 1);
          if (state.year % 8 === 0 && (c.counts.rat + c.counts.sparrow) >= 3 && c.counts.dog >= 1 && totalCounts(c) < 15) c.counts.dog += rint(0, 1);
          if (state.year % 12 === 0 && c.counts.bear >= 2 && totalCounts(c) < 8) c.counts.bear += (Math.random() < 0.25 ? 1 : 0);
          if (state.year % 10 === 0 && c.counts.crow >= 2 && totalCounts(c) < 20) c.counts.crow += rint(0, 1);
          if (state.toggles.wolf && state.year % 8 === 0 && c.counts.deer >= 2 && c.counts.wolf >= 2 && totalCounts(c) < 10) c.counts.wolf += (Math.random() < 0.35 ? 1 : 0);
          if (state.toggles.mammoth && state.year % 15 === 0 && c.grass > 0.5 && c.counts.mammoth >= 1 && c.counts.mammoth < 2) c.counts.mammoth += (Math.random() < 0.20 ? 1 : 0);
        }
      }
    }

    function nearbyWater(cell) {
      return nearestNeighbors(cell.x, cell.y, 1).some(c => c.tile === TILE.WATER);
    }

    function attritionTurn() {
      for (const row of state.grid) {
        for (const c of row) {
          if (c.tile !== TILE.WATER) {
            if (c.counts.rat > 0 && (c.grass + c.urbanDecay) < 0.20) c.counts.rat = Math.max(0, c.counts.rat - 1);
            if (c.counts.deer > 0 && c.grass < 0.18) c.counts.deer = Math.max(0, c.counts.deer - 1);
            if (c.counts.boar > 0 && (c.grass + c.shrub) < 0.22) c.counts.boar = Math.max(0, c.counts.boar - 1);
            if (c.counts.bear > 0 && totalCounts(c) < 3) c.counts.bear = Math.max(0, c.counts.bear - (Math.random() < 0.3 ? 1 : 0));
            if (c.counts.wolf > 0 && c.counts.deer + (c.humanBase ? 2 : 0) < 1) c.counts.wolf = Math.max(0, c.counts.wolf - (Math.random() < 0.3 ? 1 : 0));
          }
          if (c.tile === TILE.WATER) {
            c.counts.porpoise = Math.max(0, c.counts.porpoise - (c.counts.fish < 4 && Math.random() < 0.25 ? 1 : 0));
          }
        }
      }
    }

    function yearlyStep() {
      state.year += 1;
      migrationTurn();
      humanTurn();
      moveSpecies('rat');
      moveSpecies('sparrow');
      moveSpecies('crow');
      moveSpecies('bat');
      moveSpecies('cat');
      moveSpecies('dog');
      moveSpecies('tanuki');
      moveSpecies('boar');
      moveSpecies('deer');
      moveSpecies('bear');
      moveSpecies('fish');
      moveSpecies('porpoise');
      if (state.toggles.wolf) moveSpecies('wolf');
      if (state.toggles.mammoth) moveSpecies('mammoth');
      predationTurn();
      plantSuccession();
      reproduceTurn();
      attritionTurn();

      // milestone logs
      const forest = forestRate();
      if (state.year % 10 === 0) addLog(`森林率 ${forest}% / ネズミ ${totalSpecies('rat')} / シカ ${totalSpecies('deer')}`);
      if (forest >= 35 && state.year % 5 === 0) addLog('都市の自然回帰が進行。');
      if (totalSpecies('deer') >= 18 && Math.random() < 0.2) addLog('シカの定着が目立ち始めた。');
      if (totalSpecies('porpoise') >= 6 && Math.random() < 0.3) addLog('お台場沖でスナメリ群が確認された。');

      pushHistory();
      renderAll();
    }

    function cellPlantColor(cell) {
      if (cell.tile === TILE.WATER) return '#2f76b8';
      if (cell.tile === TILE.MOUNTAIN) {
        if (cell.tree > 0.55) return '#35572d';
        return '#6f5a3f';
      }
      if (cell.tree >= 0.55) return '#1f5f32';
      if (cell.shrub >= 0.32) return '#4b8c4a';
      if (cell.grass >= 0.30) return '#7ab55c';
      return '#6d7378';
    }

    function renderMap() {
      mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
      mapCtx.fillStyle = '#0d1318';
      mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
      const pad = 10;
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const c = state.grid[y][x];
          const px = pad + x * CELL;
          const py = pad + y * CELL;
          mapCtx.fillStyle = cellPlantColor(c);
          mapCtx.fillRect(px, py, CELL - 1, CELL - 1);
          if (c.humanBase && state.human.alive) {
            mapCtx.strokeStyle = '#f0f3ff';
            mapCtx.lineWidth = 2;
            mapCtx.strokeRect(px + 2, py + 2, CELL - 5, CELL - 5);
          }
          drawCellAnimals(c, px, py);
        }
      }
      // labels
      mapCtx.fillStyle = 'rgba(255,255,255,0.55)';
      mapCtx.font = '12px sans-serif';
      for (const p of placeLabels) {
        mapCtx.fillText(p.name, pad + p.x * CELL + 2, pad + p.y * CELL + 16);
      }
    }

    function drawDot(px, py, color, r) {
      mapCtx.fillStyle = color;
      mapCtx.beginPath();
      mapCtx.arc(px, py, r, 0, Math.PI * 2);
      mapCtx.fill();
    }

    function drawCellAnimals(c, px, py) {
      // show only major presence to avoid clutter
      const centers = [
        [px + 9, py + 9], [px + 18, py + 9], [px + 27, py + 9],
        [px + 9, py + 18], [px + 18, py + 18], [px + 27, py + 18],
        [px + 9, py + 27], [px + 18, py + 27], [px + 27, py + 27],
      ];
      const layers = [];
      if (c.counts.rat > 0) layers.push(['#f2f2f2', 2.8]);
      if (c.counts.sparrow > 0) layers.push(['#ffe18f', 2.6]);
      if (c.counts.crow > 0) layers.push(['#cfd5dc', 3]);
      if (c.counts.cat > 0) layers.push(['#ffb36b', 3.4]);
      if (c.counts.dog > 0) layers.push(['#f08a63', 3.4]);
      if (c.counts.tanuki > 0) layers.push(['#b38961', 3.4]);
      if (c.counts.boar > 0) layers.push(['#8b5a3c', 3.8]);
      if (c.counts.deer > 0) layers.push(['#ffd36b', 4]);
      if (c.counts.bear > 0) layers.push(['#5d4037', 4.2]);
      if (c.counts.wolf > 0) layers.push(['#8fa2b8', 4]);
      if (c.counts.mammoth > 0) layers.push(['#bba98a', 4.6]);
      if (c.counts.fish > 0 && c.tile === TILE.WATER) layers.push(['#7be2ff', 3]);
      if (c.counts.porpoise > 0 && c.tile === TILE.WATER) layers.push(['#d7f3ff', 4]);

      layers.slice(0, centers.length).forEach((layer, i) => drawDot(centers[i][0], centers[i][1], layer[0], layer[1]));
    }

    function renderStats() {
      document.getElementById('yearLabel').textContent = `Year ${state.year}`;
      document.getElementById('stat-rat').textContent = totalSpecies('rat');
      document.getElementById('stat-deer').textContent = totalSpecies('deer');
      document.getElementById('stat-pred').textContent = totalPredators();
      document.getElementById('stat-forest').textContent = `${forestRate()}%`;
      document.getElementById('stat-human').textContent = state.human.alive ? `${state.human.population} (Lv${state.human.level})` : '0';
    }

    function renderGraph() {
      graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
      graphCtx.fillStyle = '#10161d';
      graphCtx.fillRect(0, 0, graphCanvas.width, graphCanvas.height);
      const padL = 36, padR = 10, padT = 10, padB = 26;
      const w = graphCanvas.width - padL - padR;
      const h = graphCanvas.height - padT - padB;
      graphCtx.strokeStyle = '#324252';
      graphCtx.strokeRect(padL, padT, w, h);

      const maxY = Math.max(20, ...state.history.flatMap(d => [d.rat, d.deer * 4, d.pred * 2, d.human * 4, d.forest * 2]));
      const drawSeries = (key, color, scale = 1) => {
        graphCtx.strokeStyle = color;
        graphCtx.lineWidth = 2;
        graphCtx.beginPath();
        state.history.forEach((d, i) => {
          const x = padL + (i / Math.max(1, state.history.length - 1)) * w;
          const yVal = d[key] * scale;
          const y = padT + h - (yVal / maxY) * h;
          if (i === 0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
        });
        graphCtx.stroke();
      };
      drawSeries('rat', '#f2f2f2', 1);
      drawSeries('deer', '#ffd36b', 4);
      drawSeries('pred', '#ff8f8f', 2);
      drawSeries('forest', '#69d487', 2);
      drawSeries('human', '#6fc3ff', 4);

      graphCtx.fillStyle = '#c9d7e5';
      graphCtx.font = '11px sans-serif';
      graphCtx.fillText('ネズミ', 12, 18);
      graphCtx.fillStyle = '#ffd36b'; graphCtx.fillText('シカ', 60, 18);
      graphCtx.fillStyle = '#ff8f8f'; graphCtx.fillText('捕食者', 96, 18);
      graphCtx.fillStyle = '#69d487'; graphCtx.fillText('森林率', 148, 18);
      graphCtx.fillStyle = '#6fc3ff'; graphCtx.fillText('人間', 202, 18);
      graphCtx.fillStyle = '#95a9bd';
      graphCtx.fillText('Year', graphCanvas.width - 36, graphCanvas.height - 8);
    }

    function renderAll() {
      renderMap();
      renderStats();
      renderGraph();
    }

    function setRunning(running) {
      state.running = running;
      document.getElementById('playBtn').textContent = running ? '停止' : '再生';
      if (timer) clearInterval(timer);
      if (running) {
        timer = setInterval(yearlyStep, Number(document.getElementById('speedSelect').value));
      }
    }

    document.getElementById('playBtn').addEventListener('click', () => setRunning(!state.running));
    document.getElementById('stepBtn').addEventListener('click', () => yearlyStep());
    document.getElementById('resetBtn').addEventListener('click', () => {
      setRunning(false);
      logEl.innerHTML = '';
      resetState();
    });
    document.getElementById('speedSelect').addEventListener('change', () => {
      if (state.running) setRunning(true);
    });
    document.getElementById('toggleHuman').addEventListener('change', () => {
      setRunning(false); logEl.innerHTML=''; resetState();
    });
    document.getElementById('toggleWolf').addEventListener('change', () => {
      setRunning(false); logEl.innerHTML=''; resetState();
    });
    document.getElementById('toggleMammoth').addEventListener('change', () => {
      setRunning(false); logEl.innerHTML=''; resetState();
    });

    resetState();
  </script>
</body>
</html>
